<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Calculate your skin cancer risk level based on age, genetics, skin tone, and UV exposure history.">
  <title>Skin Cancer Risk Calculator - DermAI</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <section class="section" style="padding-top: calc(var(--navbar-h) + 20px);">
    <div class="container" style="max-width: 800px;">
      
      <div class="section-header text-center">
        <span class="section-badge"><i class="fa-solid fa-calculator"></i> Risk Assessment</span>
        <h2>Skin Cancer Risk Calculator</h2>
        <p class="mx-auto">Answer these clinical questionnaire parameters to calculate your risk index score and receive personalized sun safety advice.</p>
      </div>

      <div class="card" style="padding: 40px; border-color: rgba(21,101,192,0.15);">
        
        <!-- Calculator Form -->
        <form id="risk-form">
          <div class="grid grid-2" style="gap: 24px;">
            
            <!-- Age Group -->
            <div class="form-group">
              <label class="form-label" for="risk-age">What is your age range?</label>
              <select class="form-control" id="risk-age" required>
                <option value="0">Under 30 years</option>
                <option value="5">30 to 50 years</option>
                <option value="12">Over 50 years</option>
              </select>
            </div>

            <!-- Skin Type (Fitzpatrick scale) -->
            <div class="form-group">
              <label class="form-label" for="risk-skin">What is your skin type / sun reaction?</label>
              <select class="form-control" id="risk-skin" required>
                <option value="15">Fair skin (Always burns, never tans)</option>
                <option value="10">Light skin (Usually burns, tans minimally)</option>
                <option value="5">Medium skin (Burns moderately, tans gradually)</option>
                <option value="0">Dark skin (Rarely burns, tans easily)</option>
              </select>
            </div>

            <!-- History of Sunburns -->
            <div class="form-group">
              <label class="form-label" for="risk-burns">Have you had severe blistering sunburns?</label>
              <select class="form-control" id="risk-burns" required>
                <option value="0">Never</option>
                <option value="5">1 to 2 times in lifetime</option>
                <option value="15">3 or more times / Frequent</option>
              </select>
            </div>

            <!-- Family History -->
            <div class="form-group">
              <label class="form-label" for="risk-family">Any personal/family history of skin cancer?</label>
              <select class="form-control" id="risk-family" required>
                <option value="0">No history</option>
                <option value="8">Family history (First-degree relative)</option>
                <option value="18">Personal history (Had skin cancer before)</option>
              </select>
            </div>

            <!-- Sun Exposure -->
            <div class="form-group" style="grid-column: span 2;">
              <label class="form-label" for="risk-exposure">How often are you exposed to direct peak sunlight (10 AM - 4 PM) without sunscreen?</label>
              <select class="form-control" id="risk-exposure" required>
                <option value="0">Rarely / Always wear sunscreen</option>
                <option value="6">Occasionally (Weekends / Outdoor sports)</option>
                <option value="14">Frequently (Outdoor occupation / daily exposure)</option>
              </select>
            </div>

            <!-- Moles count -->
            <div class="form-group" style="grid-column: span 2; margin-bottom: 30px;">
              <label class="form-label" for="risk-moles">Approximately how many moles do you have on your body?</label>
              <select class="form-control" id="risk-moles" required>
                <option value="0">Fewer than 10</option>
                <option value="5">11 to 40</option>
                <option value="12">More than 40 moles</option>
              </select>
            </div>

          </div>

          <button class="btn btn-primary btn-lg" style="width: 100%; justify-content: center;" type="submit">Calculate Risk Level <i class="fa-solid fa-calculator"></i></button>
        </form>

        <!-- RESULTS BLOCK (HIDDEN BY DEFAULT) -->
        <div id="risk-results" style="display: none; margin-top: 40px; border-top: 1px solid var(--border); padding-top: 30px; text-align: center;">
          
          <!-- Needle gauge widget -->
          <div class="risk-gauge">
            <svg width="200" height="110">
              <!-- Background arcs -->
              <path d="M 15 100 A 85 85 0 0 1 185 100" fill="none" stroke="var(--border)" stroke-width="12" stroke-linecap="round"></path>
              <!-- Color guides -->
              <path d="M 15 100 A 85 85 0 0 1 70 30" fill="none" stroke="var(--success)" stroke-width="12"></path>
              <path d="M 70 30 A 85 85 0 0 1 130 30" fill="none" stroke="var(--warning)" stroke-width="12"></path>
              <path d="M 130 30 A 85 85 0 0 1 185 100" fill="none" stroke="var(--alert)" stroke-width="12"></path>
            </svg>
            <div class="risk-needle" id="gauge-needle"></div>
          </div>

          <h3 id="result-risk-title" style="margin-bottom: 8px;">Moderate Risk</h3>
          <p id="result-risk-score" style="font-size: 0.9rem; margin-bottom: 24px; color: var(--text-muted); font-weight: 600;"></p>

          <div class="alert alert-info" id="result-risk-advice" style="text-align: left; margin-bottom: 24px;"></div>

          <div class="flex-center gap">
            <button class="btn btn-primary" id="recalc-btn">Recalculate</button>
            <a href="upload.html" class="btn btn-outline">Go to AI Scan</a>
          </div>

        </div>

      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>

  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('risk');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();

    const form = document.getElementById('risk-form');
    const resultsDiv = document.getElementById('risk-results');
    const needle = document.getElementById('gauge-needle');
    const recalcBtn = document.getElementById('recalc-btn');

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      // Sum selections values
      const valAge = parseInt(document.getElementById('risk-age').value);
      const valSkin = parseInt(document.getElementById('risk-skin').value);
      const valBurns = parseInt(document.getElementById('risk-burns').value);
      const valFamily = parseInt(document.getElementById('risk-family').value);
      const valExposure = parseInt(document.getElementById('risk-exposure').value);
      const valMoles = parseInt(document.getElementById('risk-moles').value);

      const score = valAge + valSkin + valBurns + valFamily + valExposure + valMoles;
      
      form.style.display = 'none';
      resultsDiv.style.display = 'block';

      // Set needle angle (scale: 0 to 74 max score maps to -90 to 90 degrees)
      const maxScore = 74;
      const angle = -90 + (score / maxScore) * 180;
      
      // Update needle rotation
      setTimeout(() => {
        needle.style.transform = `translateX(-50%) rotate(${angle}deg)`;
      }, 200);

      // Score evaluation text
      let riskTitle = '';
      let riskClass = '';
      let riskAdvice = '';

      if (score < 25) {
        riskTitle = 'Low Risk Level';
        riskClass = 'badge-success';
        riskAdvice = '<strong>Sun Care Guidelines:</strong><br>• Continue applying SPF 30+ daily.<br>• Perform monthly skin checks for any changing mole coordinates.<br>• Schedule general screenings once every 2 years.';
      } else if (score < 48) {
        riskTitle = 'Moderate Risk Level';
        riskClass = 'badge-warning';
        riskAdvice = '<strong>Recommended Safety Measures:</strong><br>• Ensure daily use of SPF 50 sunscreen with regular reapplication.<br>• Minimize mid-day peak solar radiation exposures.<br>• Schedule annual physical screening with a dermatologist.';
      } else {
        riskTitle = 'High Risk Level';
        riskClass = 'badge-danger';
        riskAdvice = '<strong>Urgent Action Steps Required:</strong><br>• Arrange a dermatologist examination for overall baseline skin mapping.<br>• Apply physical sunscreen block daily, wear UV-blocking covers.<br>• Scan suspicious lesions using AI/dermatoscopy scans immediately.';
      }

      document.getElementById('result-risk-title').textContent = riskTitle;
      document.getElementById('result-risk-score').innerHTML = `Questionnaire Assessment Index: <span class="badge ${riskClass}">${score} / 74 Points</span>`;
      document.getElementById('result-risk-advice').innerHTML = riskAdvice;
    });

    recalcBtn.addEventListener('click', () => {
      resultsDiv.style.display = 'none';
      form.style.display = 'block';
      form.reset();
      needle.style.transform = 'translateX(-50%) rotate(-90deg)';
    });
  </script>
</body>
</html>
