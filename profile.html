<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="View diagnostic screening logs, update security profile options, and retrieve clinical report cards.">
  <title>User Profile - DermAI Skin Cancer Classification</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

  <div id="navbar-placeholder"></div>

  <section class="section" style="padding-top: calc(var(--navbar-h) + 20px);">
    <div class="container" style="max-width: 1000px;">
      
      <div class="grid grid-3" style="align-items: start; gap: 32px;">
        
        <!-- Left: User details card -->
        <div class="card text-center" style="grid-column: span 1; padding: 30px;">
          <div style="font-size: 4rem; margin-bottom: 16px;" id="profile-avatar">👤</div>
          <h3 style="margin-bottom: 6px;" id="profile-name">Patient Profile</h3>
          <p style="font-size: 0.8rem; margin-bottom: 24px;" id="profile-email">email@domain.com</p>
          
          <hr style="border: none; border-top: 1px solid var(--border); margin-bottom: 20px;">
          
          <div style="text-align: left; font-size: 0.85rem; display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px;">
            <div class="flex flex-between">
              <span style="color:var(--text-muted);">Joined</span>
              <strong id="profile-joined">N/A</strong>
            </div>
            <div class="flex flex-between">
              <span style="color:var(--text-muted);">Account Role</span>
              <span class="badge badge-primary" id="profile-role">User</span>
            </div>
          </div>

          <button class="btn btn-outline btn-sm" style="width: 100%;" onclick="Auth.logout()"><i class="fa-solid fa-power-off"></i> Sign Out</button>
        </div>

        <!-- Right: Screening logs -->
        <div class="card" style="grid-column: span 2; padding: 30px;">
          <div class="flex flex-between" style="margin-bottom: 24px;">
            <h2 style="font-size: 1.4rem;"><i class="fa-solid fa-clock-rotate-left"></i> Screening History Logs</h2>
            <button class="btn btn-danger btn-sm" id="clear-history-btn" style="display: none;"><i class="fa-solid fa-trash-can"></i> Clear Log</button>
          </div>

          <div id="history-empty" style="text-align: center; padding: 40px 0;">
            <i class="fa-solid fa-folder-open" style="font-size: 3rem; color: var(--text-light); margin-bottom: 16px;"></i>
            <h4 style="margin-bottom: 8px;">No Scan History Recorded</h4>
            <p style="font-size: 0.85rem; margin-bottom: 24px; max-width: 380px; margin-left: auto; margin-right: auto;">Upload skin lesions through our AI scanner to record diagnostic logs on this profile.</p>
            <a href="upload.html" class="btn btn-primary btn-sm">Start Screening</a>
          </div>

          <!-- History Logs Table -->
          <div class="table-wrap" id="history-table-container" style="display: none;">
            <table>
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Class Findings</th>
                  <th>Type</th>
                  <th>Confidence</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="history-log-tbody"></tbody>
            </table>
          </div>

        </div>

      </div>

    </div>
  </section>

  <div id="footer-placeholder"></div>

  <!-- CDN dependencies -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Scripts -->
  <script src="app.js"></script>
  <script src="report.js"></script>
  <script>
    document.getElementById('navbar-placeholder').innerHTML = renderNavbar('profile');
    document.getElementById('footer-placeholder').innerHTML = renderFooter();

    // Force user authentication
    if (Auth.requireLogin()) {
      const user = Auth.getUser();
      document.getElementById('profile-name').textContent = user.name;
      document.getElementById('profile-email').textContent = user.email;
      document.getElementById('profile-avatar').textContent = user.avatar;
      document.getElementById('profile-joined').textContent = Utils.formatDate(user.joined);
      
      const roleBadge = document.getElementById('profile-role');
      roleBadge.textContent = Utils.capitalize(user.role);
      roleBadge.className = 'badge ' + (user.role === 'admin' ? 'badge-danger' : 'badge-primary');

      // Populate history log
      loadHistoryLog();
    }

    function loadHistoryLog() {
      const history = PredictionHistory.getAll();
      const emptyDiv = document.getElementById('history-empty');
      const tableDiv = document.getElementById('history-table-container');
      const tbody = document.getElementById('history-log-tbody');
      const clearBtn = document.getElementById('clear-history-btn');

      if (history.length === 0) {
        emptyDiv.style.display = 'block';
        tableDiv.style.display = 'none';
        clearBtn.style.display = 'none';
      } else {
        emptyDiv.style.display = 'none';
        tableDiv.style.display = 'block';
        clearBtn.style.display = 'inline-flex';

        tbody.innerHTML = history.map((record, index) => `
          <tr>
            <td>
              <div style="font-weight:600;">${Utils.formatDate(record.date)}</div>
              <div style="font-size:0.75rem;color:var(--text-muted);">${Utils.formatTime(record.date)}</div>
            </td>
            <td>
              <strong style="color: var(--primary);">${record.class}</strong>
              <div style="font-size:0.75rem;color:var(--text-muted);">Model: ${record.model || 'Ensemble'}</div>
            </td>
            <td>
              <span class="badge ${record.type === 'Malignant' ? 'badge-danger' : record.type === 'Benign' ? 'badge-success' : 'badge-warning'}">${record.type}</span>
            </td>
            <td>
              <strong style="font-size:1.05rem;">${record.confidence}%</strong>
            </td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="downloadPdfHistory(${index})"><i class="fa-solid fa-file-pdf"></i> Report</button>
            </td>
          </tr>
        `).join('');
      }
    }

    function downloadPdfHistory(index) {
      const history = PredictionHistory.getAll();
      if (history[index]) {
        PDFReport.generate(history[index], history[index].heatmap);
      }
    }

    document.getElementById('clear-history-btn').addEventListener('click', () => {
      if (confirm('Are you sure you want to clear all screening logs from this profile?')) {
        PredictionHistory.clear();
        loadHistoryLog();
        Toast.show('Screening logs deleted.', 'info');
      }
    });
  </script>
</body>
</html>
